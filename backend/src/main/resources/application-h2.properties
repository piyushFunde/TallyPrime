# ========================
# SmartERP H2 Fallback Configuration
# ========================

spring.application.name=SmartERP

# ========================
# H2 In-Memory Database Configuration
# ========================
spring.datasource.url=jdbc:h2:mem:smarterp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Use H2 dialect to override the default postgresql dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ========================
# Server
# ========================
server.port=8080

# ========================
# Swagger / OpenAPI
# ========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
